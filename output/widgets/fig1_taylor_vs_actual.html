<figure class="chart-embed" style="margin:0; font-family:var(--font-body);">
<p style="margin:0 0 3px;font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted);">Federal Reserve · Policy Brief · 2018–2026</p>
<p style="margin:0 0 3px;font-size:18px;font-weight:500;color:var(--text);line-height:1.3;">Federal Funds Rate vs. Taylor Rule Prescriptions</p>
<p style="margin:0 0 18px;font-size:12px;color:var(--muted);">Effective federal funds rate and rules-based benchmarks · percent · quarterly</p>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;"><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Peak deviation (2022-Q1)</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">+8.3pp</div></div><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Taylor implied (2026-Q1)</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">4.79%</div></div><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Actual FFR (2026-Q1)</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">3.64%</div></div></div>
<div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px;"><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="actual" style="display:inline-block;width:20px;height:2px;background:#888;border-radius:1px;flex-shrink:0;"></span>Actual EFFR</span><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="taylor1" data-dash="1" style="display:inline-block;width:20px;height:0;border-bottom:2px dashed #888;flex-shrink:0;"></span>Taylor Rule (r*=0.5%)</span><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="taylor2" data-dash="1" style="display:inline-block;width:20px;height:0;border-bottom:2px dashed #888;flex-shrink:0;"></span>Taylor Rule (r*=2.0%, 1993 original)</span></div>
<div style="position:relative; width:100%; height:260px;">
<canvas id="warsh-fig1" role="img" aria-label="Federal funds rate vs Taylor Rule, 2018-2026"></canvas>
</div>
<div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:10px;color:var(--muted);letter-spacing:0.02em;"><span>Source: <a href="https://fred.stlouisfed.org/" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">Federal Reserve Economic Data (FRED)</a>, CBO. Author&#8217;s calculations.</span><a href="https://nikkhosravipour.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">nikkhosravipour.com</a></div>
</figure>
<script>
(function () {
  window.__chartjs = window.__chartjs || new Promise(function(resolve) {
    if (window.Chart) return resolve();
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
    s.onload = resolve; document.head.appendChild(s);
  });
  var canvas = document.getElementById('warsh-fig1');
  if (!canvas) return;
  var scope = canvas.closest('figure');
  var chart;
  function palette() {
    var light = document.documentElement.classList.contains('is-light');
    return {
      tick:    light ? 'rgba(0,0,0,0.42)'       : 'rgba(255,255,255,0.5)',
      grid:    light ? 'rgba(0,0,0,0.06)'       : 'rgba(255,255,255,0.07)',
      yTick:   light ? 'rgba(0,0,0,0.65)'       : 'rgba(255,255,255,0.7)',
      actual:  light ? '#1C1C1A'                : '#E8E6DF',
      taylor1: light ? '#185FA5'                : '#60a5fa',
      taylor2: light ? '#1D9E75'                : '#34d399',
      dev_pos: light ? '#D85A30'                : '#f87171',
      dev_neg: light ? '#185FA5'                : '#60a5fa',
      ngdp:    light ? '#1C1C1A'                : '#E8E6DF',
      trend:   light ? '#185FA5'                : '#60a5fa',
      covid:   light ? 'rgba(185,210,235,0.35)' : 'rgba(96,165,250,0.12)',
      text:    light ? '#1C1C1A'                : '#E8E6DF',
      muted:   light ? 'rgba(0,0,0,0.50)'       : 'rgba(255,255,255,0.55)',
    };
  }
  function render() {
    if (!window.Chart) return;
    var c = palette();
    scope.querySelectorAll('[data-k]').forEach(function(sw) { if (sw.dataset.dash) sw.style.borderBottomColor = c[sw.dataset.k]; else sw.style.background = c[sw.dataset.k]; });
    var labels = ["2018-Q1", "2018-Q2", "2018-Q3", "2018-Q4", "2019-Q1", "2019-Q2", "2019-Q3", "2019-Q4", "2020-Q1", "2020-Q2", "2020-Q3", "2020-Q4", "2021-Q1", "2021-Q2", "2021-Q3", "2021-Q4", "2022-Q1", "2022-Q2", "2022-Q3", "2022-Q4", "2023-Q1", "2023-Q2", "2023-Q3", "2023-Q4", "2024-Q1", "2024-Q2", "2024-Q3", "2024-Q4", "2025-Q1", "2025-Q2", "2025-Q3", "2025-Q4", "2026-Q1"];
    var covidPlugin = {
      id: 'covidShade',
      afterDraw: function(chart) {
        var ctx = chart.ctx, ca = chart.chartArea, xs = chart.scales.x;
        var i1 = labels.indexOf('2020-Q1'), i2 = labels.indexOf('2022-Q1');
        if (i1 < 0 || i2 < 0) return;
        var px1 = xs.getPixelForValue(i1), px2 = xs.getPixelForValue(i2);
        ctx.save(); ctx.fillStyle = c.covid;
        ctx.fillRect(px1, ca.top, px2 - px1, ca.bottom - ca.top);
        ctx.restore();
      }
    };
    if (chart) chart.destroy();
    chart = new Chart(canvas, {
      type: 'line',
      plugins: [covidPlugin],
      data: { labels: labels, datasets: [
        { label: 'Actual EFFR', data: [1.51, 1.82, 1.95, 2.27, 2.41, 2.38, 2.04, 1.55, 0.65, 0.08, 0.09, 0.09, 0.07, 0.08, 0.08, 0.08, 0.20, 1.21, 2.56, 4.10, 4.65, 5.08, 5.33, 5.33, 5.33, 5.33, 5.13, 4.48, 4.33, 4.33, 4.22, 3.72, 3.64], borderColor: c.actual, borderWidth: 3, pointRadius: 0, tension: 0.3, fill: false },
        { label: 'Taylor (r*=0.5%)', data: [2.52, 2.57, 2.66, 2.58, 2.00, 2.21, 2.50, 2.45, 1.51, 0.00, 0.62, 0.99, 2.48, 5.57, 5.95, 8.33, 8.48, 7.84, 8.32, 7.39, 7.15, 6.53, 5.73, 4.95, 4.74, 4.30, 4.52, 4.66, 3.79, 4.18, 4.47, 4.47, 4.79], borderColor: c.taylor1, borderWidth: 1.5, borderDash: [6,3], pointRadius: 0, tension: 0.3, fill: false },
        { label: 'Taylor (r*=2.0%)', data: [4.02, 4.07, 4.16, 4.08, 3.50, 3.71, 4.00, 3.95, 3.01, 0.00, 2.12, 2.49, 3.98, 7.07, 7.45, 9.83, 9.98, 9.34, 9.82, 8.89, 8.65, 8.03, 7.23, 6.45, 6.24, 5.80, 6.02, 6.16, 5.29, 5.68, 5.97, 5.97, 6.29], borderColor: c.taylor2, borderWidth: 1.5, borderDash: [3,3], pointRadius: 0, tension: 0.3, fill: false }
      ]},
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        layout: { padding: { top: 26, right: 20, left: 0, bottom: 4 } },
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false }, title: { display: false } },
        scales: {
          x: {
            border: { display: false },
            grid: { color: c.grid },
            ticks: { color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' },
              maxRotation: 0, autoSkip: false,
              callback: function(val, i) { return i % 4 === 0 ? labels[i] : null; } }
          },
          y: { border: { display: false }, grid: { color: c.grid },
            ticks: { color: c.yTick, font: { size: 10, family: 'system-ui, sans-serif' },
              callback: function(v) { return v + '%'; } } }
        }
      }
    });
  }
  window.__chartjs.then(function() {
    render();
    new MutationObserver(render).observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
  });
})();
</script>
