<figure class="chart-embed" style="margin:0; font-family:var(--font-body);">
<p style="margin:0 0 3px;font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted);">Federal Reserve · Policy Brief · 2018–2026</p>
<p style="margin:0 0 3px;font-size:18px;font-weight:500;color:var(--text);line-height:1.3;">Two Measures. One Verdict.</p>
<p style="margin:0 0 18px;font-size:12px;color:var(--muted);">Taylor Rule deviation (bars, left) and NGDP gap vs. 4% trend (line, right) · quarterly</p>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;"><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Peak Taylor gap</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">+8.3pp (2022-Q1)</div></div><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">NGDP overshoot (2026-Q1)</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">+13.1%</div></div><div style="background:var(--bg-soft);border:1px solid var(--border);border-radius:6px;padding:8px 12px;"><div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Actual FFR (2026-Q1)</div><div style="font-size:1.05rem;font-weight:600;color:var(--text);">3.64%</div></div></div>
<div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px;"><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="dev_pos" style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#888;flex-shrink:0;"></span>Too loose (above Taylor prescription)</span><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="dev_neg" style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#888;flex-shrink:0;"></span>Too tight (below prescription)</span><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);"><span data-k="taylor1" style="display:inline-block;width:20px;height:2px;background:#888;border-radius:1px;flex-shrink:0;"></span>NGDP gap vs. 4% trend (right)</span></div>
<div style="position:relative; width:100%; height:260px;">
<canvas id="warsh-fig0" role="img" aria-label="Taylor Rule deviation bars and NGDP gap line, 2018-2026"></canvas>
</div>
<div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:10px;color:var(--muted);letter-spacing:0.02em;"><span>Source: <a href="https://fred.stlouisfed.org/" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">Federal Reserve Economic Data (FRED)</a>, CBO. Author&#8217;s calculations.</span><a href="https://nikkhosravipour.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">nikkhosravipour.com</a></div>
</figure>
<script>
(function () {
  window.__chartjs = window.__chartjs || new Promise(function(resolve) {
    if (window.Chart) return resolve();
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js';
    s.onload = resolve; document.head.appendChild(s);
  });
  var canvas = document.getElementById('warsh-fig0');
  if (!canvas) return;
  var scope = canvas.closest('figure');
  var chart;
  function palette() {
    var light = document.documentElement.classList.contains('is-light');
    return {
      tick:    light ? 'rgba(0,0,0,0.42)'       : 'rgba(255,255,255,0.5)',
      grid:    light ? 'rgba(0,0,0,0.06)'       : 'rgba(255,255,255,0.07)',
      yTick:   light ? 'rgba(0,0,0,0.65)'       : 'rgba(255,255,255,0.7)',
      actual:  light ? '#1C1C1A'                : '#E8E6DF',
      taylor1: light ? '#185FA5'                : '#60a5fa',
      taylor2: light ? '#1D9E75'                : '#34d399',
      dev_pos: light ? '#D85A30'                : '#f87171',
      dev_neg: light ? '#185FA5'                : '#60a5fa',
      ngdp:    light ? '#1C1C1A'                : '#E8E6DF',
      trend:   light ? '#185FA5'                : '#60a5fa',
      covid:   light ? 'rgba(185,210,235,0.35)' : 'rgba(96,165,250,0.12)',
      text:    light ? '#1C1C1A'                : '#E8E6DF',
      muted:   light ? 'rgba(0,0,0,0.50)'       : 'rgba(255,255,255,0.55)',
    };
  }
  function render() {
    if (!window.Chart) return;
    var c = palette();
    scope.querySelectorAll('[data-k]').forEach(function(sw) { if (sw.dataset.dash) sw.style.borderBottomColor = c[sw.dataset.k]; else sw.style.background = c[sw.dataset.k]; });
    var labels = ["2018-Q1", "2018-Q2", "2018-Q3", "2018-Q4", "2019-Q1", "2019-Q2", "2019-Q3", "2019-Q4", "2020-Q1", "2020-Q2", "2020-Q3", "2020-Q4", "2021-Q1", "2021-Q2", "2021-Q3", "2021-Q4", "2022-Q1", "2022-Q2", "2022-Q3", "2022-Q4", "2023-Q1", "2023-Q2", "2023-Q3", "2023-Q4", "2024-Q1", "2024-Q2", "2024-Q3", "2024-Q4", "2025-Q1", "2025-Q2", "2025-Q3", "2025-Q4", "2026-Q1"];
    var vals   = [1.01, 0.75, 0.71, 0.31, -0.41, -0.17, 0.46, 0.90, 0.86, -0.08, 0.53, 0.90, 2.41, 5.49, 5.87, 8.25, 8.28, 6.63, 5.76, 3.29, 2.50, 1.45, 0.40, -0.38, -0.59, -1.03, -0.61, 0.18, -0.54, -0.15, 0.25, 0.75, 1.15];
    var covidPlugin = {
      id: 'covidShade',
      afterDraw: function(chart) {
        var ctx = chart.ctx, ca = chart.chartArea, xs = chart.scales.x;
        var i1 = labels.indexOf('2020-Q1'), i2 = labels.indexOf('2022-Q1');
        if (i1 < 0 || i2 < 0) return;
        var px1 = xs.getPixelForValue(i1), px2 = xs.getPixelForValue(i2);
        ctx.save(); ctx.fillStyle = c.covid;
        ctx.fillRect(px1, ca.top, px2 - px1, ca.bottom - ca.top);
        ctx.restore();
      }
    };
    var zeroLinePlugin = {
      id: 'zeroLine',
      afterDraw: function(chart) {
        var ctx = chart.ctx, ca = chart.chartArea, ys = chart.scales.y;
        var y0 = ys.getPixelForValue(0);
        ctx.save();
        ctx.strokeStyle = c.tick; ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(ca.left, y0); ctx.lineTo(ca.right, y0); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = c.tick;
        ctx.font = '9px system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText('Rules-based prescription', ca.right - 4, y0 - 4);
        ctx.restore();
      }
    };
    if (chart) chart.destroy();
    chart = new Chart(canvas, {
      type: 'bar',
      plugins: [covidPlugin, zeroLinePlugin],
      data: { labels: labels, datasets: [
        { label: 'Taylor deviation', data: [1.01, 0.75, 0.71, 0.31, -0.41, -0.17, 0.46, 0.90, 0.86, -0.08, 0.53, 0.90, 2.41, 5.49, 5.87, 8.25, 8.28, 6.63, 5.76, 3.29, 2.50, 1.45, 0.40, -0.38, -0.59, -1.03, -0.61, 0.18, -0.54, -0.15, 0.25, 0.75, 1.15],
          backgroundColor: vals.map(function(v) { return v > 0 ? c.dev_pos : c.dev_neg; }),
          borderRadius: 2, yAxisID: 'y' },
        { label: 'NGDP gap (%)', data: [-0.64, -0.39, -0.33, -0.76, -0.84, -0.47, 0.01, 0.00, -1.82, -10.80, -3.96, -3.24, -1.63, 0.61, 1.98, 4.46, 5.24, 6.74, 7.62, 8.31, 9.01, 9.19, 10.25, 10.51, 10.50, 11.08, 11.36, 11.42, 11.11, 11.65, 12.77, 12.81, 13.09],
          type: 'line', borderColor: c.taylor1, borderWidth: 2,
          pointRadius: 0, tension: 0.3, fill: false, yAxisID: 'y1' }
      ]},
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        layout: { padding: { top: 26, right: 20, left: 0, bottom: 4 } },
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false }, title: { display: false } },
        scales: {
          x: {
            border: { display: false },
            grid: { color: c.grid },
            ticks: { color: c.tick, font: { size: 10, family: 'system-ui, sans-serif' },
              maxRotation: 0, autoSkip: false,
              callback: function(val, i) { return i % 4 === 0 ? labels[i] : null; } }
          },
          y: { position: 'left', border: { display: false }, grid: { color: c.grid },
            ticks: { color: c.yTick, font: { size: 10, family: 'system-ui, sans-serif' },
              callback: function(v) { return v + 'pp'; } } },
          y1: { position: 'right', border: { display: false }, grid: { drawOnChartArea: false },
            ticks: { color: c.taylor1, font: { size: 10, family: 'system-ui, sans-serif' },
              callback: function(v) { return v + '%'; } } }
        }
      }
    });
  }
  window.__chartjs.then(function() {
    render();
    new MutationObserver(render).observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
  });
})();
</script>
